name: Quarto Render + Deploy → GitHub Pages
# ============================================================
# @project      Tlahtoa Data 2026
# @author       Jesús Rafael Loggen Gonzalez <loggibooy@gmail.com>
# @architecture Loggen Architecture™
# @copyright    © 2026 Tlahtoa Data Team · CC BY-NC-SA 4.0
# @hackods      HackODS UNAM 2026
# ============================================================

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render-and-deploy:
    name: Render Quarto + Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies with uv
        run: |
          uv pip install --system \
            pandas plotly pyyaml pydantic openpyxl \
            jsonschema requests beautifulsoup4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.4.554"

      - name: Verify data integrity
        run: |
          python3 -c "
          import json, os, sys

          checks = [
            'data/processed/state_panel.json',
            'data/processed/scenario_templates.json',
            'data/processed/irte_por_estado.csv',
            'data/processed/indicadores_normalizados.csv',
            'data/processed/comparison_payload.json',
            'data/metadata/provenance_manifest.json',
            'data/metadata/data_quality_report.json',
            'data/metadata/irte_sensitivity.csv',
            'data/metadata/source_registry.csv',
            'data/staging/un_external_validation.csv',
            'config/irte_weights.yaml',
            'dashboard/mexico.geojson',
          ]
          failed = []
          for f in checks:
              ok = os.path.exists(f)
              print(f'  {\"✅\" if ok else \"❌\"} {f}')
              if not ok: failed.append(f)

          if failed:
              print(f'\nFaltan {len(failed)} archivos — abortando deploy')
              sys.exit(1)

          d = json.load(open('data/processed/state_panel.json'))
          assert len(d['estados']) == 32
          print(f'\n  ✅ 32 estados OK')

          s = json.load(open('data/static_api/simulations.json'))
          keys = [k for k in s if not k.startswith('_')]
          total = sum(sum(len(v) for v in s[k]['simulations'].values()) for k in keys)
          assert total == 480
          print(f'  ✅ 480 combos OK')
          print(f'\n  Todo verificado — continuando con render')
          "

      - name: Render Quarto site
        run: |
          quarto render
          echo "✅ Render completado"
          ls docs/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
