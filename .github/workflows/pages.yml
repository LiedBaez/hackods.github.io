name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # URL pública del backend (FastAPI). Preferir Variable de repositorio (no secreta):
      # Repo → Settings → Secrets and variables → Actions → Variables → VITE_API_URL
      # También se acepta el homónimo en Secrets por compatibilidad.
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_PAGES_BASE: "/Tlahtoa_Oficial/"
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}

      - name: Recordatorio VITE_API_URL
        env:
          HAS_URL: ${{ vars.VITE_API_URL != '' && '1' || '' }}
          HAS_SECRET_URL: ${{ secrets.VITE_API_URL != '' && '1' || '' }}
        run: |
          if [ -n "$HAS_URL" ] || [ -n "$HAS_SECRET_URL" ]; then
            echo "::notice::VITE_API_URL definida para este build."
          else
            echo "::notice::Sin VITE_API_URL: sin URL absoluta de API en el bundle. En Pages la Lotería usa mazo demo; para datos reales define Variable o Secret VITE_API_URL."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
